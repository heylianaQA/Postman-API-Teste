
name: ServeRest Tests

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm install

      - name: Subir ServeRest
        run: npx serverest &

      - name: Aguardar ServeRest Inicializar
        run: sleep 5

      - name: Criar Pasta de Relatório
        run: mkdir -p Reports

      - name: Executar testes
        run: |
          npx newman run "Collections/ServeRestAPI.postman_collection.json" \
            -e "Environments/ServeRest-localhost.postman_environment.json" \
            -r htmlextra \
            --reporter-htmlextra-export "Reports/report.html" \
            --suppress-exit-code

      - name: Relatório HTML
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: Reports/report.html 

      - name: Publicar relatório no Github pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Reports
          destination_dir: reports